name: package

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  debian-package:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            debhelper \
            dpkg-dev \
            fakeroot \
            python3 \
            python3-venv \
            python3-yaml \
            python3-setuptools \
            python3-wheel

      - name: Build Debian package
        run: dpkg-buildpackage -us -uc

      - name: Stage Debian package artifacts
        run: |
          mkdir -p artifacts/debian
          cp ../*.deb artifacts/debian/
          cp ../*.changes artifacts/debian/
          cp ../*.buildinfo artifacts/debian/
          cp ../*.dsc artifacts/debian/
          cp ../*.tar.* artifacts/debian/

      - name: Upload Debian package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cerberus-debian-package
          path: artifacts/debian/*
